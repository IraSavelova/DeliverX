name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Build backend services
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - rates-service
          - gateway-service
          - user-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: deliverx-backend-rates/${{ matrix.service }}
        run: ./mvnw clean package -DskipTests

  frontend:
    name: Build frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
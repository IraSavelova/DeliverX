spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/auth/**,/api/auth/**,/test/auth

        - id: rates-service
          uri: http://rates-service:8080
          predicates:
            - Path=/rates/**

        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/users/**,/profile/**,/api/users/**

server:
  port: 8080

app:
  jwt:
    secret: deliverx-super-secret-jwt-key-change-in-prod-000
    expiration: 86400000
